include: package:flutter_lints/rules.yaml

analyzer:
  errors:
    deprecated_member_use: ignore
    avoid_print: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    - always_declare_return_types
    - cancel_subscriptions
    - close_sinks
    - prefer_const_constructors
